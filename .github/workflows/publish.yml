name: publish to PyPI

# NOTE: requires ricekit to be published to PyPI first, and tuistore's
# pyproject.toml dependency changed from the git URL to a normal PyPI
# version pin — PyPI rejects uploads with a direct git dependency
# (see: pypi/warehouse#9404 — 400 "Can't have direct dependency").

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    # Guard against publishing pre-release/RC GitHub Releases to real PyPI.
    # The `release: published` event fires for both normal releases and
    # ones explicitly marked "pre-release" — github.event.release.prerelease
    # distinguishes them. `!= true` (rather than `== false`) also lets this
    # job run on manual workflow_dispatch, where github.event.release is
    # unset and the expression evaluates to null.
    if: github.event.release.prerelease != true
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for PyPI Trusted Publishing (OIDC) — no API token stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
